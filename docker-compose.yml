services:
  # ── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pg-payment-gateway
    environment:
      POSTGRES_USER: ${DB_USER:-pguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pgpassword}
      POSTGRES_DB: ${DB_NAME:-payment_gateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pguser} -d ${DB_NAME:-payment_gateway}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - payment-network

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis-payment-gateway
    command: >
      redis-server
      --appendonly yes
      --maxmemory-policy noeviction
      --maxmemory 256mb
      --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - payment-network

  # ── Merchant Service ──────────────────────────
  merchant-service:
    build:
      context: .
      dockerfile: services/merchant-service/Dockerfile
    container_name: merchant-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-pguser}:${DB_PASSWORD:-pgpassword}@postgres:5432/${DB_NAME:-payment_gateway}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${MERCHANT_SERVICE_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - payment-network

  # ── Payment Gateway ──────────────────────────
  payment-gateway:
    build:
      context: .
      dockerfile: services/payment-gateway/Dockerfile
    container_name: payment-gateway
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-pguser}:${DB_PASSWORD:-pgpassword}@postgres:5432/${DB_NAME:-payment_gateway}
      REDIS_URL: redis://redis:6379
      HMAC_SECRET: ${HMAC_SECRET}
      BANK_SIMULATOR_URL: http://bank-simulator:3003
      SETTLEMENT_SERVICE_URL: http://settlement-service:3004
      MERCHANT_SERVICE_URL: http://merchant-service:3001
      PORT: 3002
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${PAYMENT_GATEWAY_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - payment-network

  # ── Bank Simulator ───────────────────────────
  bank-simulator:
    build:
      context: .
      dockerfile: services/bank-simulator/Dockerfile
    container_name: bank-simulator
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-pguser}:${DB_PASSWORD:-pgpassword}@postgres:5432/${DB_NAME:-payment_gateway}
      REDIS_URL: redis://redis:6379
      PORT: 3003
    ports:
      - "${BANK_SIMULATOR_PORT:-3003}:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - payment-network

  # ── Settlement Service ───────────────────────
  settlement-service:
    build:
      context: .
      dockerfile: services/settlement-service/Dockerfile
    container_name: settlement-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-pguser}:${DB_PASSWORD:-pgpassword}@postgres:5432/${DB_NAME:-payment_gateway}
      REDIS_URL: redis://redis:6379
      GATEWAY_FEE_PERCENTAGE: ${GATEWAY_FEE_PERCENTAGE:-2.0}
      GST_PERCENTAGE: ${GST_PERCENTAGE:-18.0}
      SETTLEMENT_CRON: ${SETTLEMENT_CRON:-0 2 * * *}
      PORT: 3004
    ports:
      - "${SETTLEMENT_SERVICE_PORT:-3004}:3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - payment-network

  # ── Prometheus ───────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus-payment-gateway
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - payment-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  payment-network:
    driver: bridge
    name: payment-gateway-network
