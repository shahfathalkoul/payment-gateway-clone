global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'merchant-service'
    static_configs:
      - targets: ['merchant-service:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'payment-gateway'
    static_configs:
      - targets: ['payment-gateway:3002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'bank-simulator'
    static_configs:
      - targets: ['bank-simulator:3003']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'settlement-service'
    static_configs:
      - targets: ['settlement-service:3004']
    metrics_path: '/metrics'
    scrape_interval: 10s
